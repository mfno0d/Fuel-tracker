<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pitstop</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Pitstop%20Fuel%20Tracker%22,%22short_name%22:%22Pitstop%22,%22start_url%22:%22/Fuel-tracker/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%23000000%22,%22icons%22:[{%22src%22:%22https://img.icons8.com/fluency/512/gas-station.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #0a0a0a;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent: #ffffff;
            --accent-dim: #111111;
            --emerald: #34d399;
            --amber: #fbbf24;
            --rose: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; min-height: 100vh; padding-bottom: 40px; }
        
        header { background: var(--bg-main); border-b: 1px solid var(--border-color); padding: 20px; sticky: top; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 20px; font-weight: 700; tracking: -0.5px; }
        
        .garage-selector-wrapper { display: flex; align-items: center; gap: 8px; }
        select { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; outline: none; }
        
        .btn-small { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-small:active { color: var(--text-main); }

        main { max-width: 450px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; }
        
        .section-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Stats Dashboard */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 18px; border-radius: 12px; }
        .stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .stat-val { font-size: 22px; font-weight: 400; margin-top: 6px; }
        
        /* Forms & Inputs */
        .form-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        input[type="number"], input[type="date"], input[type="text"] { background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; font-size: 16px; outline: none; width: 100%; }
        input:focus { border-color: #444; }
        
        .checkbox-row { background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .checkbox-lbl { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-main); text-transform: none; font-weight: normal; cursor: pointer; }
        .checkbox-lbl input { width: 16px; height: 16px; accent-color: var(--text-main); }

        .btn-primary { background: var(--text-main); color: var(--bg-main); border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; text-align: center; }
        .btn-primary:active { opacity: 0.9; }

        /* Chart Canvas wrapper */
        .chart-wrapper { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; height: 200px; position: relative; }
        
        /* Activity List */
        .log-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; }
        .log-item { background: var(--bg-card); border: 1px solid var(--border-color); padding: 14px 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .log-meta { display: flex; flex-direction: column; gap: 4px; }
        .log-date-badge { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .log-main-specs { font-size: 15px; font-weight: 500; }
        .log-right { text-align: right; display: flex; align-items: center; gap: 15px; }
        .log-cost { font-size: 16px; font-weight: 600; }
        .log-eff { font-size: 12px; color: var(--emerald); margin-top: 2px; }
        .btn-delete { background: transparent; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 5px; }
        .btn-delete:hover { color: var(--rose); }

        /* Modal Panels */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; width: 100%; max-width: 380px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

        .garage-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; margin-top: 5px; }
        .garage-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; font-size: 13px; }

        .system-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-tool { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Pitstop</h1>
        <div class="garage-selector-wrapper">
            <select id="vehicleSelect" onchange="changeActiveVehicle(this.value)"></select>
            <button class="btn-small" onclick="openGarageModal()" title="Manage Garage">⚙️</button>
        </div>
    </header>

    <main>
        <section>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-lbl">Avg Efficiency</div>
                    <div class="stat-val" id="valEff" style="color: var(--emerald);">-- <span style="font-size:12px; color:var(--text-muted);">km/L</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Cost Per KM</div>
                    <div class="stat-val" id="valCostPerKm" style="color: var(--amber);">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Total Distance</div>
                    <div class="stat-val" id="valDistance">0 <span style="font-size:12px; color:var(--text-muted);">km</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Total Invested</div>
                    <div class="stat-val" id="valSpent">$0.00</div>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">Log Core Refill</div>
            <form id="logForm" onsubmit="saveRefillLog(event)" class="form-card">
                <div class="input-group">
                    <label>Current Odometer Entry (km)</label>
                    <input type="number" id="inpOdo" required min="0" placeholder="e.g. 142000">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Total Cost</label>
                        <input type="number" id="inpCost" required step="0.01" min="0" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Fuel Pumped (Liters)</label>
                        <input type="number" id="inpLiters" required step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Fuel Grade</label>
                        <select id="inpGrade" style="padding: 12px; font-size:15px;">
                            <option value="Special 95">Special 95</option>
                            <option value="Super 98">Super 98</option>
                            <option value="E-Plus 91">E-Plus 91</option>
                            <option value="Diesel">Diesel</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Log Date</label>
                        <input type="date" id="inpDate" required>
                    </div>
                </div>
                <div class="checkbox-row">
                    <label class="checkbox-lbl">
                        <input type="checkbox" id="inpPartial"> Partial Fill-up (Omit logic math)
                    </label>
                    <label class="checkbox-lbl">
                        <input type="checkbox" id="inpMissed"> Missed preceding entry logs
                    </label>
                </div>
                <button type="submit" class="btn-primary">Commit Refill Log</button>
            </form>
        </section>

        <section>
            <div class="section-title">Efficiency Performance Trend</div>
            <div class="chart-wrapper" id="chartBox">
                <canvas id="perfChart"></canvas>
            </div>
        </section>

        <section>
            <div class="section-title"><span>Activity Records</span> <span id="recordCount" style="color:var(--text-muted);">0 logs</span></div>
            <div class="log-list" id="logsBox"></div>
        </section>

        <section>
            <div class="section-title">System & Storage Utilities</div>
            <div class="system-tools">
                <button class="btn-tool" onclick="exportStateData()">Export JSON Backup</button>
                <button class="btn-tool" onclick="document.getElementById('importFilePicker').click()">Import JSON Backup</button>
            </div>
            <input type="file" id="importFilePicker" style="display:none" accept=".json" onchange="importStateData(event)">
        </section>
    </main>

    <div class="modal" id="garageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="font-size:16px; font-weight:700;">Garage Asset Manager</h3>
                <button class="modal-close" onclick="closeGarageModal()">×</button>
            </div>
            <div class="input-group">
                <label>Add New Vehicle Name</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newVehicleName" placeholder="e.g. Golf GTI" style="padding:10px; font-size:14px;">
                    <button class="btn-primary" style="width:auto; padding:10px 15px;" onclick="addNewVehicleAsset()">Add</button>
                </div>
            </div>
            <div class="input-group">
                <label>Active Fleet</label>
                <div class="garage-list" id="garageListItems"></div>
            </div>
        </div>
    </div>

    <script>
        let appState = { vehicles: ['Default Car'], activeVehicle: 'Default Car', records: [] };
        let activeChartInstance = null;

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('inpDate').value = new Date().toISOString().split('T')[0];
            loadAppState();
            buildUI();
        });

        function loadAppState() {
            const raw = localStorage.getItem('pitstop_oled_state');
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    if (parsed.vehicles && parsed.vehicles.length > 0) appState.vehicles = parsed.vehicles;
                    appState.activeVehicle = parsed.activeVehicle || appState.vehicles[0];
                    appState.records = parsed.records || [];
                } catch(e) { console.error("Corrupted state configuration.", e); }
            } else {
                saveAppState();
            }
        }

        function saveAppState() {
            localStorage.setItem('pitstop_oled_state', JSON.stringify(appState));
        }

        function buildUI() {
            const selectEl = document.getElementById('vehicleSelect');
            selectEl.innerHTML = appState.vehicles.map(v => `<option value="${v}" ${v === appState.activeVehicle ? 'selected' : ''}>${v}</option>`).join('');
            processCalculationsAndRender();
        }

        function changeActiveVehicle(val) {
            appState.activeVehicle = val;
            saveAppState();
            processCalculationsAndRender();
        }

        function openGarageModal() {
            document.getElementById('garageModal').style.display = 'flex';
            renderGarageList();
        }

        function closeGarageModal() {
            document.getElementById('garageModal').style.display = 'none';
        }

        function renderGarageList() {
            const container = document.getElementById('garageListItems');
            container.innerHTML = appState.vehicles.map(v => `
                <div class="garage-item">
                    <span>${v}</span>
                    ${appState.vehicles.length > 1 ? `<button class="btn-delete" onclick="removeVehicleAsset('${v}')">🗑️</button>` : ''}
                </div>
            `).join('');
        }

        function addNewVehicleAsset() {
            const inp = document.getElementById('newVehicleName');
            const val = inp.value.trim();
            if (val && !appState.vehicles.includes(val)) {
                appState.vehicles.push(val);
                appState.activeVehicle = val;
                inp.value = '';
                saveAppState();
                buildUI();
                closeGarageModal();
            }
        }

        function removeVehicleAsset(v) {
            if (confirm(`Purge profile and logs for ${v}? This cannot be undone.`)) {
                appState.records = appState.records.filter(r => r.vehicle !== v);
                appState.vehicles = appState.vehicles.filter(item => item !== v);
                if (appState.activeVehicle === v) appState.activeVehicle = appState.vehicles[0];
                saveAppState();
                buildUI();
                renderGarageList();
            }
        }

        function saveRefillLog(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now().toString(),
                vehicle: appState.activeVehicle,
                odometer: parseInt(document.getElementById('inpOdo').value),
                cost: parseFloat(document.getElementById('inpCost').value),
                liters: parseFloat(document.getElementById('inpLiters').value),
                grade: document.getElementById('inpGrade').value,
                date: document.getElementById('inpDate').value,
                isPartial: document.getElementById('inpPartial').checked,
                isMissed: document.getElementById('inpMissed').checked
            };
            
            appState.records.push(newRecord);
            appState.records.sort((a,b) => new Date(a.date) - new Date(b.date));
            saveAppState();
            processCalculationsAndRender();
            
            document.getElementById('inpOdo').value = '';
            document.getElementById('inpCost').value = '';
            document.getElementById('inpLiters').value = '';
            document.getElementById('inpPartial').checked = false;
            document.getElementById('inpMissed').checked = false;
        }

        function deleteRecordLog(id) {
            if (confirm("Permanently discard this log record?")) {
                appState.records = appState.records.filter(r => r.id !== id);
                saveAppState();
                processCalculationsAndRender();
            }
        }

        function processCalculationsAndRender() {
            const subset = appState.records.filter(r => r.vehicle === appState.activeVehicle);
            let totalSpent = 0, totalLitersCalc = 0, totalDistanceCalc = 0;

            for (let i = 0; i < subset.length; i++) {
                totalSpent += subset[i].cost;
                let prev = i > 0 ? subset[i-1] : null;

                if (prev && !subset[i].isMissed) {
                    const segmentDist = subset[i].odometer - prev.odometer;
                    subset[i].calcDist = segmentDist;

                    if (!subset[i].isPartial && !prev.isPartial) {
                        subset[i].calcEff = segmentDist / subset[i].liters;
                        totalLitersCalc += subset[i].liters;
                        totalDistanceCalc += segmentDist;
                    }
                }
            }

            const totalOdoDist = subset.length > 1 ? (subset[subset.length - 1].odometer - subset[0].odometer) : 0;
            
            document.getElementById('valDistance').innerHTML = `${totalOdoDist.toLocaleString()} <span style="font-size:12px; color:var(--text-muted);">km</span>`;
            document.getElementById('valSpent').innerText = `${totalSpent.toFixed(2)}`;

            if (totalDistanceCalc > 0 && totalLitersCalc > 0) {
                document.getElementById('valEff').innerHTML = `${(totalDistanceCalc / totalLitersCalc).toFixed(2)} <span style="font-size:12px; color:var(--text-muted);">km/L</span>`;
                document.getElementById('valCostPerKm').innerText = `${(totalSpent / totalOdoDist).toFixed(2)} /km`;
            } else {
                document.getElementById('valEff').innerHTML = `-- <span style="font-size:12px; color:var(--text-muted);">km/L</span>`;
                document.getElementById('valCostPerKm').innerText = `--`;
            }

            renderLogsContainer(subset);
            renderPerformanceChart(subset);
        }

        function renderLogsContainer(subset) {
            const container = document.getElementById('logsBox');
            document.getElementById('recordCount').innerText = `${subset.length} logs`;
            
            if(subset.length === 0) {
                container.innerHTML = `<p style="text-align:center; font-size:13px; color:var(--text-muted); padding:30px 0;">No logs added yet.</p>`;
                return;
            }

            const renderArray = [...subset].reverse();
            container.innerHTML = renderArray.map(r => {
                const efficiencyDisplay = r.calcEff ? `${r.calcEff.toFixed(1)} km/L` : (r.isPartial ? 'Partial' : '--');
                return `
                    <div class="log-item">
                        <div class="log-meta">
                            <span class="log-date-badge">${r.date} · <span style="color:var(--text-main);">${r.grade}</span></span>
                            <span class="log-main-specs">${r.odometer.toLocaleString()} km <span style="font-size:11px; color:var(--text-muted);">${r.calcDist ? '(+' + r.calcDist + ' km)' : ''}</span></span>
                        </div>
                        <div class="log-right">
                            <div>
                                <div class="log-cost">${r.cost.toFixed(2)}</div>
                                <div class="log-eff">${efficiencyDisplay}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteRecordLog('${r.id}')">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPerformanceChart(subset) {
            const chartDataPoints = subset.filter(r => r.calcEff !== undefined);
            const container = document.getElementById('chartBox');
            
            // Wipe canvas elements strictly to prevent rendering memory allocation errors
            container.innerHTML = '<canvas id="perfChart"></canvas>';
            const ctx = document.getElementById('perfChart').getContext('2d');

            if(chartDataPoints.length === 0) return;

            activeChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartDataPoints.map(r => r.date),
                    datasets: [{
                        data: chartDataPoints.map(r => r.calcEff),
                        borderColor: '#ffffff',
                        borderWidth: 1.5,
                        pointRadius: 2,
                        pointBackgroundColor: '#ffffff',
                        tension: 0.15,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#444444', font: { size: 9 } } },
                        y: { grid: { color: '#111111' }, ticks: { color: '#444444', font: { size: 9 } } }
                    }
                }
            });
        }

        function exportStateData() {
            const blob = new Blob([JSON.stringify(appState)], {type : 'application/json'});
            const dl = document.createElement('a');
            dl.href = URL.createObjectURL(blob);
            dl.download = `pitstop_backup.json`;
            dl.click();
        }

        function importStateData(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    if (parsed.vehicles && parsed.records) {
                        appState = parsed;
                        saveAppState();
                        buildUI();
                        alert("Database restored successfully.");
                    } else { alert("Invalid backup schema structure."); }
                } catch(err) { alert("Failed to parse resource data."); }
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
